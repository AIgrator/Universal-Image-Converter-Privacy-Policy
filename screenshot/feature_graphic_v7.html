<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Image Converter - Feature Graphic Вариант 7</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a1a;
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
        }

        .feature-graphic {
            width: 1024px;
            height: 500px;
            background: linear-gradient(135deg, #ffffff 0%, #f8f9fa 100%);
            position: relative;
            display: flex;
            justify-content: center;
            overflow: hidden;
        }

        .top-accent {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg, #6366F1 0%, #8B5CF6 50%, #6366F1 100%);
        }

        /* Content на всю ширину 1024px */
        .content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            width: 100%;
            padding: 30px 50px 40px 50px;
            gap: 15px;
        }

        /* Заголовок по центру */
        .main-title {
            font-size: 64px;
            font-weight: 700;
            color: #1a1a2e;
            line-height: 1.2;
            letter-spacing: -1px;
            text-align: center;
            white-space: nowrap;
            margin-top: 0px;
            margin-bottom: 30px;
        }

        .main-title .highlight {
            color: #6366F1;
        }

        /* 4 карточки в ряд (логотип + 3 функции) */
        .features-row {
            display: flex;
            gap: 30px;
            justify-content: center;
            align-items: center;
        }

        .feature-box {
            width: 160px;
            height: 160px;
            background: white;
            border-radius: 30px;
            box-shadow: 0 6px 25px rgba(99, 102, 241, 0.15);
            border: 2px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
            position: relative;
        }

        /* Логотип */
        .logo-box {
            background: white;
        }

        .logo-box::before {
            content: '';
            position: absolute;
            inset: -3px;
            background: linear-gradient(135deg, #6366F1, #8B5CF6);
            border-radius: 30px;
            z-index: -1;
        }

        .logo-box img {
            width: 120px;
            height: 120px;
            object-fit: contain;
        }

        /* Функции */
        .feature-box .icon {
            font-size: 40px;
            margin-bottom: 8px;
        }

        .feature-box .title {
            font-size: 18px;
            font-weight: 700;
            color: #6366F1;
            margin-bottom: 6px;
        }

        .feature-box .desc {
            font-size: 11px;
            color: #64748b;
            line-height: 1.3;
            text-align: center;
            padding: 0 10px;
        }

        /* Преимущества в стиле чипсов */
        .advantages {
            display: flex;
            gap: 12px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            margin-top: 15px;
            padding: 0;
        }

        .advantage-chip {
            display: flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #f8f9fa, #ffffff);
            border: 2px solid #e2e8f0;
            border-radius: 50px;
            padding: 10px 18px;
            box-shadow: 0 3px 12px rgba(0, 0, 0, 0.06);
            transition: all 0.2s ease;
        }

        .advantage-chip:hover {
            box-shadow: 0 4px 16px rgba(99, 102, 241, 0.2);
            border-color: #6366F1;
        }

        .advantage-chip .check {
            width: 20px;
            height: 20px;
            background: linear-gradient(135deg, #6366F1, #8B5CF6);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 12px;
            flex-shrink: 0;
        }

        .advantage-chip .label {
            font-size: 14px;
            font-weight: 600;
            color: #334155;
            white-space: nowrap;
        }

        .formats {
            position: absolute;
            bottom: 35px;
            right: 60px;
            display: flex;
            gap: 10px;
        }

        .format-badge {
            background: linear-gradient(135deg, #6366F1, #8B5CF6);
            color: white;
            padding: 10px 16px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .decorative-circle {
            position: absolute;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.08), rgba(139, 92, 246, 0.08));
        }

        .circle-1 {
            width: 400px;
            height: 400px;
            top: -200px;
            right: -100px;
        }

        .circle-2 {
            width: 250px;
            height: 250px;
            bottom: -125px;
            left: -100px;
        }

        .bottom-accent {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg, #6366F1 0%, #8B5CF6 50%, #6366F1 100%);
        }
    </style>
</head>
<body>
    <div class="feature-graphic">
        <div class="top-accent"></div>
        <div class="decorative-circle circle-1"></div>
        <div class="decorative-circle circle-2"></div>

        <!-- Content на всю ширину 1024px -->
        <div class="content">
            <!-- Заголовок по центру -->
            <h1 class="main-title">
                Universal Image <span class="highlight">Converter</span>
            </h1>

            <!-- 4 карточки в ряд (логотип + 3 функции) -->
            <div class="features-row">
                <!-- Логотип -->
                <div class="feature-box logo-box">
                    <img src="play_store_icon.png" alt="Logo" style="width: 120px; height: 120px; object-fit: contain;">
                </div>

                <!-- Convert -->
                <div class="feature-box">
                    <div class="icon">🖼️</div>
                    <div class="title">Convert</div>
                    <div class="desc">PNG, JPG, WebP, BMP, GIF</div>
                </div>

                <!-- Resize -->
                <div class="feature-box">
                    <div class="icon">📏</div>
                    <div class="title">Resize</div>
                    <div class="desc">% or exact pixels</div>
                </div>

                <!-- Watermark -->
                <div class="feature-box">
                    <div class="icon">💧</div>
                    <div class="title">Watermark</div>
                    <div class="desc">Protect your photos</div>
                </div>
            </div>

            <!-- Преимущества в стиле чипсов (6 штук) -->
            <div class="advantages">
                <div class="advantage-chip">
                    <span class="check">✓</span>
                    <span class="label">Batch Processing</span>
                </div>
                <div class="advantage-chip">
                    <span class="check">✓</span>
                    <span class="label">100% Offline</span>
                </div>
                <div class="advantage-chip">
                    <span class="check">✓</span>
                    <span class="label">Free</span>
                </div>
                <div class="advantage-chip">
                    <span class="check">✓</span>
                    <span class="label">No Account</span>
                </div>
                <div class="advantage-chip">
                    <span class="check">✓</span>
                    <span class="label">Easy Sharing</span>
                </div>
            </div>
        </div>

        <div class="formats">
            <span class="format-badge">PNG</span>
            <span class="format-badge">JPG</span>
            <span class="format-badge">WEBP</span>
            <span class="format-badge">BMP</span>
            <span class="format-badge">GIF</span>
        </div>

        <div class="bottom-accent"></div>
    </div>
</body>
</html>
